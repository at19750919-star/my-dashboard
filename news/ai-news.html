<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工具日報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAF7F2; --bg-card:#fff; --bg-claude:#FFF8F0;
  --border:#E8E2D9; --border-lt:#F0EBE3;
  --t1:#1A1A1A; --t2:#5C5C5C; --t3:#8A8A8A;
  --claude:#C2410C; --news:#0F766E; --hf:#92400E; --gh:#4338CA;
  --tag-claude:#EA580C; --tag-tool:#0D9488; --tag-model:#B45309;
  --tag-app:#7C3AED; --tag-open:#059669; --tag-agent:#DB2777;
  --r:6px;
  --serif:'Noto Serif TC','Source Serif 4',Georgia,serif;
  --sans:'Noto Sans TC','Inter',-apple-system,sans-serif;
  --mono:'Inter','Noto Sans TC',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ── Masthead ── */
.masthead{max-width:820px;margin:0 auto;padding:48px 24px 0;text-align:center;border-bottom:3px double var(--border)}
.masthead-rule{display:block;width:60px;height:2px;background:var(--t1);margin:0 auto 16px}
.masthead h1{font-family:var(--serif);font-size:2.4rem;font-weight:900;letter-spacing:.04em}
.masthead .edition{font-size:.82rem;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-top:6px}
.masthead .date-line{font-family:var(--serif);font-style:italic;font-size:1rem;color:var(--t2);margin-top:4px;padding-bottom:18px}

/* ── Date nav ── */
.date-nav{max-width:820px;margin:0 auto;display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.date-tab{flex:1;min-width:0;padding:12px 8px;text-align:center;font-size:.82rem;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.date-tab:hover{color:var(--t1);background:rgba(0,0,0,.02)}
.date-tab.active{color:var(--t1);font-weight:700;border-bottom-color:var(--t1)}
.date-tab .tab-weekday{font-size:.72rem;display:block;color:var(--t3)}
.date-tab.active .tab-weekday{color:var(--t2)}

/* ── Stats strip ── */
.stats-strip{max-width:820px;margin:0 auto;display:flex;justify-content:center;gap:0;padding:12px 24px;border-bottom:1px solid var(--border);font-size:.8rem;color:var(--t3);letter-spacing:.04em}
.stat-item{padding:0 16px;border-right:1px solid var(--border-lt)}
.stat-item:last-child{border-right:none}
.stat-num{font-weight:700;color:var(--t1);font-family:var(--mono)}

/* ── Filter bar ── */
.filter-bar{max-width:820px;margin:0 auto;display:flex;gap:6px;padding:12px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;justify-content:center}
.fbtn{padding:4px 14px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-size:.78rem;font-family:var(--sans);font-weight:500;letter-spacing:.03em;transition:all .15s}
.fbtn:hover{border-color:var(--t2);color:var(--t1)}
.fbtn.active{background:var(--t1);color:#fff;border-color:var(--t1)}

/* ── Container ── */
.container{max-width:820px;margin:0 auto;padding:0 24px 80px}

/* ── Day block ── */
.day-block{margin-top:8px}
.day-header{display:flex;align-items:center;gap:10px;padding:16px 0 8px;cursor:pointer;user-select:none}
.day-header h3{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--t1)}
.day-header .day-toggle{font-size:.65rem;color:var(--t3);transition:transform .2s}
.day-header .day-toggle.collapsed{transform:rotate(-90deg)}
.day-content.hidden{display:none}

/* ── Section ── */
.section{margin-top:24px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding-bottom:10px;border-bottom:2px solid var(--t1);user-select:none;margin-bottom:2px}
.sec-hdr h2{font-family:var(--serif);font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-cnt{font-family:var(--sans);font-size:.72rem;font-weight:500;color:var(--t3);background:var(--border-lt);border-radius:3px;padding:1px 7px}
.sec-toggle{font-size:.65rem;color:var(--t3);transition:transform .2s}
.sec-toggle.collapsed{transform:rotate(-90deg)}
.sec-body.hidden{display:none}

/* Section colors */
.sec-claude .sec-hdr{border-bottom-color:var(--claude)}.sec-claude .sec-hdr h2{color:var(--claude)}
.sec-news .sec-hdr{border-bottom-color:var(--news)}.sec-news .sec-hdr h2{color:var(--news)}
.sec-hf .sec-hdr{border-bottom-color:var(--hf)}.sec-hf .sec-hdr h2{color:var(--hf)}
.sec-gh .sec-hdr{border-bottom-color:var(--gh)}.sec-gh .sec-hdr h2{color:var(--gh)}

/* Sub labels */
.sub-label{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:16px 0 2px;padding-left:2px}

/* ── Card ── */
.card{background:var(--bg-card);border:1px solid var(--border-lt);border-radius:var(--r);padding:16px 18px;margin:8px 0;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--border)}
.sec-claude .card{background:var(--bg-claude);border-color:#FDBA74;border-left:3px solid var(--claude)}
.sec-news .card{border-left:3px solid var(--news)}
.sec-hf .card{border-left:3px solid var(--hf)}
.sec-gh .card{border-left:3px solid var(--gh)}
.card-t{font-family:var(--serif);font-weight:700;font-size:1rem;line-height:1.5;margin-bottom:5px}
.card-t a{border-bottom:1px solid transparent;transition:border-color .15s}.card-t a:hover{border-bottom-color:var(--t1)}
.card-d{font-size:.88rem;color:var(--t2);line-height:1.7;margin-bottom:8px}
.card-m{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{display:inline-block;padding:1px 7px;border-radius:2px;font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.tag-claude{background:#FFF7ED;color:var(--tag-claude)}.tag-tool{background:#F0FDFA;color:var(--tag-tool)}
.tag-model{background:#FFFBEB;color:var(--tag-model)}.tag-app{background:#F5F3FF;color:var(--tag-app)}
.tag-open{background:#ECFDF5;color:var(--tag-open)}.tag-agent{background:#FDF2F8;color:var(--tag-agent)}
.gh-stats{display:flex;gap:14px;font-size:.8rem;color:var(--t3);margin-top:6px;font-family:var(--mono)}

.footer{max-width:820px;margin:0 auto;padding:24px;text-align:center;font-size:.78rem;color:var(--t3);border-top:1px solid var(--border)}

/* ── No data ── */
.no-data{text-align:center;padding:60px 20px;color:var(--t3);font-size:.95rem}

@media(max-width:600px){
  .masthead h1{font-size:1.6rem}
  .stats-strip{flex-wrap:wrap;gap:6px}.stat-item{border-right:none;padding:2px 10px}
  .card{padding:13px 14px}
  .container{padding:0 16px 60px}
  .date-tab{padding:10px 6px;font-size:.75rem}
}
</style>
</head>
<body>

<header class="masthead">
  <span class="masthead-rule"></span>
  <h1>AI 工具日報</h1>
  <div class="edition">Daily Intelligence Brief</div>
  <div class="date-line" id="headerDate"></div>
</header>

<nav class="date-nav" id="dateNav"></nav>
<div class="stats-strip" id="statsStrip"></div>

<div class="filter-bar" id="filterBar">
  <button class="fbtn active" data-f="all">全部</button>
  <button class="fbtn" data-f="claude">Claude</button>
  <button class="fbtn" data-f="tool">工具</button>
  <button class="fbtn" data-f="model">模型</button>
  <button class="fbtn" data-f="app">應用</button>
  <button class="fbtn" data-f="open">開源</button>
  <button class="fbtn" data-f="agent">智能體</button>
</div>

<main class="container" id="main"></main>

<footer class="footer">AI 工具日報 — 自動收集，每日更新 · Powered by Claude</footer>

<script src="ai-news-data.js"></script>
<script>
const SUB_LABELS = { product:'🔥 產品更新', devtool:'🛠️ 開發者工具', tutorial:'📚 教學資源', ecosystem:'🌐 生態系動態' };
const TAG_MAP = { claude:'Claude', tool:'工具', model:'模型', app:'應用', open:'開源', agent:'智能體' };
let activeFilter = 'all';
let activeDate = 0; // index in AI_NEWS_DATA

function tag(t){ return `<span class="tag tag-${t}">${TAG_MAP[t]||t}</span>` }
function tags(arr){ return arr.map(tag).join('') }

function cardHTML(item, extraBottom=''){
  const hidden = activeFilter!=='all' && !(item.tags||[]).includes(activeFilter);
  return `<div class="card" data-tags="${(item.tags||[]).join(' ')}" style="${hidden?'display:none':''}">
    <div class="card-t"><a href="${item.url}" target="_blank" rel="noopener">${item.title||item.name}</a></div>
    <div class="card-d">${item.desc}</div>
    ${extraBottom}
    <div class="card-m">${tags(item.tags||[])}</div>
  </div>`;
}

function renderDay(day, idx){
  const isToday = idx === 0;
  const s = day.stats;
  const total = s.claude + s.news + (s.skill||0);

  // Group claude items by sub
  const claudeBySub = {};
  (day.claude||[]).forEach(c => { (claudeBySub[c.sub] = claudeBySub[c.sub]||[]).push(c); });

  let html = `<div class="day-block" data-day-idx="${idx}">`;

  // If multiple days, show day header (collapsible)
  if(AI_NEWS_DATA.length > 1){
    html += `<div class="day-header" onclick="toggleDay(this)">
      <span class="day-toggle${isToday?'':' collapsed'}">&#9662;</span>
      <h3>${day.date}（${day.weekday}）</h3>
      <span style="font-size:.78rem;color:var(--t3)">${total} 項</span>
    </div>
    <div class="day-content${isToday?'':' hidden'}">`;
  }

  // Claude section
  html += `<div class="section sec-claude">
    <div class="sec-hdr" onclick="toggleSec(this)"><h2>Claude 動態專區 <span class="sec-cnt">${s.claude}</span></h2><span class="sec-toggle">&#9662;</span></div>
    <div class="sec-body">`;
  for(const sub of ['product','devtool','tutorial','ecosystem']){
    if(!claudeBySub[sub]) continue;
    html += `<div class="sub-label">${SUB_LABELS[sub]}</div>`;
    claudeBySub[sub].forEach(c => { html += cardHTML(c); });
  }
  html += `</div></div>`;

  // News section
  html += `<div class="section sec-news">
    <div class="sec-hdr" onclick="toggleSec(this)"><h2>AI 新聞頭條 <span class="sec-cnt">${s.news}</span></h2><span class="sec-toggle">&#9662;</span></div>
    <div class="sec-body">`;
  (day.news||[]).forEach(n => { html += cardHTML(n); });
  html += `</div></div>`;

  // Skill section
  if((day.skill||[]).length > 0){
    html += `<div class="section sec-gh">
      <div class="sec-hdr" onclick="toggleSec(this)"><h2>熱門 Agent Skills <span class="sec-cnt">${s.skill||day.skill.length}</span></h2><span class="sec-toggle">&#9662;</span></div>
      <div class="sec-body">`;
    (day.skill||[]).forEach(sk => {
      const meta = sk.author ? `<div class="gh-stats"><span>${sk.author}</span>${sk.source?`<span>${sk.source}</span>`:''}</div>` : '';
      html += cardHTML(sk, meta);
    });
    html += `</div></div>`;
  }

  if(AI_NEWS_DATA.length > 1) html += `</div>`; // close day-content
  html += `</div>`; // close day-block
  return html;
}

function renderAll(){
  if(!AI_NEWS_DATA || AI_NEWS_DATA.length === 0){
    document.getElementById('main').innerHTML = '<div class="no-data">尚無新聞資料</div>';
    return;
  }

  const latest = AI_NEWS_DATA[0];

  // Header date
  document.getElementById('headerDate').textContent = `${latest.date.replace(/-/g,' 年 ').replace(/ 年 /,(m,i)=> i===4?' 年 ':' 月 ')}日，${latest.weekday}`;
  // Fix: simpler approach
  const [y,m,d] = latest.date.split('-');
  document.getElementById('headerDate').textContent = `${y} 年 ${parseInt(m)} 月 ${parseInt(d)} 日，${latest.weekday}`;

  // Date nav tabs
  let navHTML = '';
  AI_NEWS_DATA.forEach((day, i) => {
    const [,mm,dd] = day.date.split('-');
    navHTML += `<div class="date-tab${i===0?' active':''}" data-idx="${i}" onclick="scrollToDay(${i})">
      ${parseInt(mm)}/${parseInt(dd)}
      <span class="tab-weekday">${day.weekday}</span>
    </div>`;
  });
  document.getElementById('dateNav').innerHTML = navHTML;

  // Stats for active (latest) day
  updateStats(latest);

  // Render all days
  let mainHTML = '';
  AI_NEWS_DATA.forEach((day, i) => { mainHTML += renderDay(day, i); });
  document.getElementById('main').innerHTML = mainHTML;
}

function updateStats(day){
  const s = day.stats;
  document.getElementById('statsStrip').innerHTML =
    `<div class="stat-item">Claude <span class="stat-num">${s.claude}</span></div>
     <div class="stat-item">新聞 <span class="stat-num">${s.news}</span></div>
     <div class="stat-item">Skills <span class="stat-num">${s.skill||0}</span></div>
     <div class="stat-item">合計 <span class="stat-num">${s.claude+s.news+(s.skill||0)}</span></div>`;
}

function scrollToDay(idx){
  // Update tab active state
  document.querySelectorAll('.date-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  updateStats(AI_NEWS_DATA[idx]);

  // Expand target day, keep others as-is
  const block = document.querySelector(`.day-block[data-day-idx="${idx}"]`);
  if(block){
    const content = block.querySelector('.day-content');
    const toggle = block.querySelector('.day-toggle');
    if(content && content.classList.contains('hidden')){
      content.classList.remove('hidden');
      if(toggle) toggle.classList.remove('collapsed');
    }
    block.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function toggleDay(header){
  const content = header.nextElementSibling;
  const toggle = header.querySelector('.day-toggle');
  content.classList.toggle('hidden');
  toggle.classList.toggle('collapsed');
}

function toggleSec(hdr){
  const body = hdr.nextElementSibling;
  const toggle = hdr.querySelector('.sec-toggle');
  body.classList.toggle('hidden');
  toggle.classList.toggle('collapsed');
}

// Filter
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.fbtn');
  if(!btn) return;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;

  document.querySelectorAll('.card').forEach(card => {
    if(activeFilter === 'all'){ card.style.display = ''; return; }
    card.style.display = (card.dataset.tags||'').includes(activeFilter) ? '' : 'none';
  });

  // Hide empty sections
  document.querySelectorAll('.section').forEach(sec => {
    if(activeFilter === 'all'){ sec.style.display = ''; return; }
    const hasVisible = [...sec.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    sec.style.display = hasVisible ? '' : 'none';
  });

  // Hide empty sub-labels
  document.querySelectorAll('.sub-label').forEach(label => {
    if(activeFilter === 'all'){ label.style.display = ''; return; }
    let next = label.nextElementSibling;
    let any = false;
    while(next && !next.classList.contains('sub-label')){
      if(next.classList.contains('card') && next.style.display !== 'none') any = true;
      next = next.nextElementSibling;
    }
    label.style.display = any ? '' : 'none';
  });
});

renderAll();
</script>
</body>
</html>
